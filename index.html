<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>多比的分帳學院</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: #f5f7fb;
  margin: 0;
  padding: 20px;
}

.card {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  font-size: 14px;
  color: #555;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 14px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 12px;
  background: #6c63ff;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #574fd6;
}
</style>
</head>

<body>

<div class="card">
  <h2>💸 多比的分帳學院</h2>

  <label>付款人</label>
  <select id="payer">
    <option>Beth</option>
    <option>Rainie</option>
    <option>Ann</option>
  </select>

  <label>金額</label>
  <input id="totalAmount" placeholder="請輸入金額">

  <label>備註</label>
  <input id="note" placeholder="（例如：午餐、飲料）">

  <button onclick="submit()">✨ 送出記帳</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw0Gq6yOyj2D0H2CTQW3lkEnxDejzDnwDCmHaEXQgMWizCQcnS1FiJ7fHq9qpqSBUOn/exec";
const NOTIFY_URL = "https://dobby-line-webhook.bace0621.workers.dev/";

async function submit() {
  const payer = document.getElementById("payer").value;
  const total = Number(document.getElementById("totalAmount").value || 0);
  const note = document.getElementById("note").value;

  if (!total) {
    alert("請輸入金額");
    return;
  }

  const entry = {
    id: "E" + Date.now(),
    type: "expense",
    createdBy: payer,
    createdAt: new Date().toISOString(),
    payer,
    total,
    note
  };

  // GAS
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "upsert_entry",
      entry
    })
  });

  const result = await res.json();

  if (!result.ok) {
    alert("雲端失敗：" + JSON.stringify(result));
    return;
  }

  // LINE
  const notify = await fetch(NOTIFY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "push_group_message",
      text: `💸 新增記帳\n👤 ${payer}\n💰 ${total} 元\n📝 ${note || "（無備註）"}`
    })
  });

  const notifyResult = await notify.json();

  if (!notifyResult.ok) {
    alert("LINE失敗：" + JSON.stringify(notifyResult));
  }

  alert("記帳完成 🎉");

  // 清空（重點）
  document.getElementById("totalAmount").value = "";
  document.getElementById("note").value = "";
}
</script>

</body>
</html>
