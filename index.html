<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>多比的分帳學院｜編輯者版</title>
<style>
:root{--bg:#fff4f8;--card:#fff;--line:#f3d6e3;--text:#4d3b46;--muted:#8f7482;--pink:#ff77a8;--pink2:#ff94bb;--soft:#fff0f6;--shadow:0 10px 24px rgba(170,105,136,.12)}
*{box-sizing:border-box} body{margin:0;font-family:"Noto Sans TC",system-ui,sans-serif;background:linear-gradient(180deg,#fff8fb,#fff2f7);color:var(--text);padding:16px 12px 90px}
.wrap{max-width:680px;margin:0 auto}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;margin-bottom:12px}.hero{background:linear-gradient(135deg,#ffe6f0,#fffafc)}
h1{margin:0 0 8px;font-size:24px}.muted{color:var(--muted);font-size:13px;line-height:1.6} label{display:block;font-size:13px;font-weight:800;color:var(--muted);margin:0 0 8px}
input,select{width:100%;border:1.5px solid #f0d5e2;border-radius:16px;padding:14px;font-size:16px;outline:none;background:#fff;color:var(--text);margin-bottom:12px} input:focus,select:focus{border-color:var(--pink);box-shadow:0 0 0 4px rgba(255,119,168,.12)}
button{border:0;border-radius:18px;padding:14px 16px;min-height:50px;font-size:15px;font-weight:800;cursor:pointer}.btn-main{background:linear-gradient(135deg,var(--pink2),var(--pink));color:#fff;box-shadow:0 12px 24px rgba(255,111,153,.24)}.btn-sub{background:#fff;border:1.5px solid #f0d5e2;color:var(--text)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.sticky{position:fixed;left:0;right:0;bottom:0;padding:10px 12px;background:rgba(255,247,251,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line)}.sticky .inner{max-width:680px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.hidden{display:none!important}.item{border:1px solid #f1d7e2;border-radius:16px;background:#fff;padding:12px;margin-bottom:10px}.pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#fff0f6;border:1px solid #ffd7e8;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card hero"><h1>🏫 多比的分帳學院</h1><div class="muted">編輯者版：可記帳、查帳、看歷史與設定。</div></div>

  <section id="page-record">
    <div class="card">
      <label>付款人</label><select id="payer"><option>Beth</option><option>Rainie</option><option>Ann</option></select>
      <label>總金額</label><input id="totalAmount" type="number" min="1" step="1" placeholder="請輸入金額" />
      <label>備註</label><input id="note" placeholder="可留空" />
      <button class="btn-main" onclick="submitEntry()">✨ 送出記帳</button>
    </div>
    <div class="card"><div id="noticePreview" class="muted"></div></div>
  </section>

  <section id="page-ledger" class="hidden">
    <div class="card"><h3>📊 誰欠誰</h3><div id="ledgerResult"></div></div>
    <div class="card"><h3>🧾 歷史紀錄</h3><div id="historyList"></div></div>
  </section>

  <section id="page-settings" class="hidden">
    <div class="card">
      <h3>⚙️ 設定</h3>
      <label>Apps Script Web App URL</label><input id="apiUrl" />
      <label>LINE Worker URL</label><input id="notifyUrl" />
      <button class="btn-main" onclick="saveConfig()">💾 儲存設定</button>
    </div>
  </section>
</div>
<div class="sticky"><div class="inner">
  <button class="btn-sub" onclick="switchPage('record')">🧾 記帳</button>
  <button class="btn-sub" onclick="switchPage('ledger')">📊 查帳</button>
  <button class="btn-sub" onclick="switchPage('settings')">⚙️ 設定</button>
</div></div>
<script>
let APP_CONFIG = {
  apiUrl: 'https://script.google.com/macros/s/AKfycbw0Gq6yOyj2D0H2CTQW3lkEnxDejzDnwDCmHaEXQgMWizCQcnS1FiJ7fHq9qpqSBUOn/exec',
  notifyUrl: 'https://dobby-line-webhook.bace0621.workers.dev/'
};
let entries = [];
const USERS = ['Beth','Rainie','Ann'];
function syncConfig(){ document.getElementById('apiUrl').value = APP_CONFIG.apiUrl; document.getElementById('notifyUrl').value = APP_CONFIG.notifyUrl; }
function saveConfig(){ APP_CONFIG.apiUrl=document.getElementById('apiUrl').value.trim(); APP_CONFIG.notifyUrl=document.getElementById('notifyUrl').value.trim(); localStorage.setItem('dobby_editor_config', JSON.stringify(APP_CONFIG)); alert('已儲存'); }
function loadConfig(){ try{ const raw=localStorage.getItem('dobby_editor_config'); if(raw) APP_CONFIG = Object.assign(APP_CONFIG, JSON.parse(raw)); }catch(e){} syncConfig(); }
function switchPage(page){ ['record','ledger','settings'].forEach(p=>document.getElementById('page-'+p).classList.toggle('hidden', p!==page)); if(page==='ledger') renderLedger(); }
function splitEvenly(total){ const base=Math.floor(total/USERS.length); let r=total%USERS.length; return USERS.map(u=>({user:u,amount:base+(r-->0?1:0)})); }
function buildNoticeText(entry){ return `✨ 多比記帳通知\n\n👤 ${entry.payer}\n💰 ${entry.total} 元\n📝 ${entry.note || '（無備註）'}\n\n🧾 分帳：\nBeth：${entry.allocation[0].amount}\nRainie：${entry.allocation[1].amount}\nAnn：${entry.allocation[2].amount}`; }
async function submitEntry(){ const payer=document.getElementById('payer').value; const total=Math.round(Number(document.getElementById('totalAmount').value||0)); const note=document.getElementById('note').value.trim(); if(total<=0)return alert('請輸入大於 0 的金額'); const entry={id:'E'+Date.now(),type:'expense',createdBy:payer,payer,total,note,allocation:splitEvenly(total),status:'active',createdAt:new Date().toISOString()}; const saveRes=await fetch(APP_CONFIG.apiUrl,{method:'POST',body:JSON.stringify({action:'upsert_entry',entry})}); const saveData=await saveRes.json(); if(!saveData.ok)return alert('雲端寫入失敗：'+JSON.stringify(saveData)); const notifyRes=await fetch(APP_CONFIG.notifyUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'push_group_message',text:buildNoticeText(entry)})}); const notifyData=await notifyRes.json(); if(!notifyData.ok) alert('LINE 通知失敗：'+JSON.stringify(notifyData)); document.getElementById('totalAmount').value=''; document.getElementById('note').value=''; document.getElementById('noticePreview').textContent='已送出：'+buildNoticeText(entry).replace(/\n/g,' / '); await loadEntries(); alert('完成 🎉'); }
async function loadEntries(){ const res=await fetch(APP_CONFIG.apiUrl,{method:'POST',body:JSON.stringify({action:'list_entries'})}); const data=await res.json(); entries = data.ok ? (data.entries || data.data || []) : []; renderLedger(); }
function renderLedger(){ const balance={}; USERS.forEach(u=>balance[u]=0); const active=entries.filter(e=>e&&e.status!=='void'&&e.type==='expense'); active.forEach(e=>{ (e.allocation||[]).forEach(a=>{ if(a.user!==e.payer){ balance[a.user]-=Number(a.amount||0); balance[e.payer]+=Number(a.amount||0); }})}); const ledger=document.getElementById('ledgerResult'); ledger.innerHTML=''; let has=false; Object.keys(balance).forEach(u=>{ if(balance[u]<0){ has=true; const div=document.createElement('div'); div.className='item'; div.innerHTML=`<strong>${u}</strong> 應付 ${Math.abs(balance[u])} 元`; ledger.appendChild(div);} }); if(!has) ledger.innerHTML='<div class="item">目前無欠款</div>'; const history=document.getElementById('historyList'); history.innerHTML=''; if(!active.length){ history.innerHTML='<div class="item">目前尚無紀錄</div>'; return; } active.slice().reverse().slice(-20).reverse().forEach(e=>{ const div=document.createElement('div'); div.className='item'; div.innerHTML=`<div><span class="pill">${e.payer}</span></div><div style="margin-top:8px"><strong>${e.total}</strong> 元</div><div class="muted">${e.note||'無備註'}</div>`; history.appendChild(div); }); }
loadConfig(); loadEntries();
</script>
</body>
</html>
