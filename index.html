<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>多比的分帳學院</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; padding:20px; }
input,select,button { margin:5px 0; padding:8px; width:100%; }
button { background:#4CAF50;color:white;border:none; }
</style>
</head>

<body>

<h2>💸 多比的分帳學院</h2>

<label>付款人</label>
<select id="payer">
  <option>Beth</option>
  <option>Rainie</option>
  <option>Ann</option>
</select>

<label>金額</label>
<input id="totalAmount" placeholder="輸入金額">

<label>備註</label>
<input id="note" placeholder="">

<button onclick="submit()">送出</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw0Gq6yOyj2D0H2CTQW3lkEnxDejzDnwDCmHaEXQgMWizCQcnS1FiJ7fHq9qpqSBUOn/exec";
const NOTIFY_URL = "https://dobby-line-webhook.bace0621.workers.dev/";

async function submit() {
  const payer = document.getElementById("payer").value;
  const total = Number(document.getElementById("totalAmount").value || 0);
  const note = document.getElementById("note").value;

  if (!total) {
    alert("請輸入金額");
    return;
  }

  const entry = {
    id: "E" + Date.now(),
    type: "expense",
    createdBy: payer,
    createdAt: new Date().toISOString(),
    payer,
    total,
    note
  };

  // ===== GAS =====
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "upsert_entry",
      entry
    })
  });

  const result = await res.json();

  if (!result.ok) {
    alert("雲端失敗：" + JSON.stringify(result));
    return;
  }

  // ===== LINE =====
  const notify = await fetch(NOTIFY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "push_group_message",
      text: `💸 新增記帳\n${payer} 花了 ${total} 元\n${note || ""}`
    })
  });

  const notifyResult = await notify.json();
  console.log("notify:", notifyResult);

  if (!notifyResult.ok) {
    alert("LINE失敗：" + JSON.stringify(notifyResult));
  }

  alert("完成");

  // 清空
  document.getElementById("totalAmount").value = "";
  document.getElementById("note").value = "";
}
</script>

</body>
</html>
